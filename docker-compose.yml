services:
  awanstream:
    image: ${DOCKER_IMAGE:-awanstream:local}
    container_name: awanstream
    restart: unless-stopped
    # Allocate a TTY so Node.js uses line-buffered stdout. Without this,
    # logs are block-buffered (4 KB) and only appear in `docker logs` after
    # the buffer fills up — confusing because requests look like they don't
    # generate any output.
    tty: true
    ports:
      - "${PORT:-7575}:7575"
    env_file: .env
    volumes:
      - awanstream-db:/app/db
      - awanstream-logs:/app/logs
      - awanstream-uploads:/app/public/uploads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://localhost:7575/login',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  awanstream-db:
  awanstream-logs:
  awanstream-uploads:
