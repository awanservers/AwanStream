stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

unit-test:
  stage: test
  image: node:20-alpine
  script:
    - echo "Install dependencies..."
    - npm ci --omit=dev
    - echo "Menjalankan smoke test..."
    - node scripts/smoke.js
    - echo "Menjalankan render check..."
    - node scripts/render-check.js
  allow_failure: false
  only:
    - main
    - merge_requests

build-and-push:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - echo "Membangun Docker Image Versi $CI_COMMIT_SHORT_SHA..."
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - echo "Mendorong Image ke GitLab Registry..."
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE:latest"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  only:
    - main

# ==========================================
# STAGE AUTO DEPLOYMENT
# ==========================================
deploy-to-server:
  stage: deploy
  image: alpine:latest
  environment:
    name: AwanStream
  before_script:
    - 'command -v ssh-agent >/dev/null || ( apk add --update openssh )'
    - eval $(ssh-agent -s)
    - chmod 400 "$DEPLOY_SSH_KEY"
    - ssh-add "$DEPLOY_SSH_KEY"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts || true
  script:
    - echo "🚀 Memulai Auto-Deploy AwanStream Versi $CI_COMMIT_SHORT_SHA..."
    # 1. Siapkan folder deploy (data runtime pakai Docker named volumes)
    - ssh $DEPLOY_USER@$DEPLOY_HOST "mkdir -p $DEPLOY_PATH"
    # 2. Generate .env dari CI variables
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "cat > $DEPLOY_PATH/.env << 'EOF'
      PORT=$APP_PORT
      SESSION_SECRET=$SESSION_SECRET
      NODE_ENV=development
      TZ=$APP_TZ
      TZ_LABEL=$APP_TZ_LABEL
      DOCKER_IMAGE=$CI_REGISTRY_IMAGE:latest
      EOF
      chmod 600 $DEPLOY_PATH/.env"
    # 3. Kirim docker-compose.yml
    - scp docker-compose.yml $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml
    # 4. Pull image + restart container
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH &&
        echo '1. Login ke GitLab Registry...' &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        echo '2. Pull image versi $CI_COMMIT_SHORT_SHA...' &&
        docker pull $CI_REGISTRY_IMAGE:latest &&
        echo '3. Restart container...' &&
        docker compose down 2>/dev/null || true &&
        docker compose up -d &&
        echo '4. Bersih-bersih image lama...' &&
        docker image prune -a -f"
    - echo "✅ Auto-CD Versi $CI_COMMIT_SHORT_SHA Selesai!"
  only:
    - main
