stages:
  - test
  - build
  - deploy

variables:
  NODE_IMAGE: node:20-bookworm-slim

# --- Test stage ---
test:
  stage: test
  image: $NODE_IMAGE
  before_script:
    - apt-get update -qq && apt-get install -y -qq ffmpeg > /dev/null 2>&1
    - npm ci --omit=dev
  script:
    - node scripts/smoke.js
    - node scripts/render-check.js
  rules:
    - if: $CI_COMMIT_BRANCH

# --- Build stage ---
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# --- Deploy stage ---
deploy:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - 'command -v ssh-agent >/dev/null || ( apk add --update openssh )'
    - eval $(ssh-agent -s)
    # Sanity check — ensure DEPLOY_SSH_KEY variable is injected.
    # If this prints empty, the variable is Protected but the branch isn't.
    - |
      if [ -z "$DEPLOY_SSH_KEY" ]; then
        echo "❌ DEPLOY_SSH_KEY is empty."
        echo "This usually means the variable is marked 'Protected' in GitLab,"
        echo "but the current branch/tag is NOT protected."
        echo "Fix: either protect the branch, or uncheck 'Protect variable' in Settings → CI/CD → Variables."
        exit 1
      fi
    - echo "✓ DEPLOY_SSH_KEY path = $DEPLOY_SSH_KEY"
    - chmod 400 "$DEPLOY_SSH_KEY"
    - ssh-add "$DEPLOY_SSH_KEY"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts || true
  script:
    - echo "🚀 Deploying AwanStream to production..."
    - |
      ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "
        mkdir -p $DEPLOY_PATH &&
        cd $DEPLOY_PATH &&
        cat > .env << 'ENVEOF'
      PORT=$APP_PORT
      SESSION_SECRET=$SESSION_SECRET
      NODE_ENV=production
      TZ=$APP_TZ
      TZ_LABEL=$APP_TZ_LABEL
      ENVEOF
        chmod 600 .env
      "
    - scp docker-compose.yml $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml
    - |
      ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH &&
        echo '1. Login to GitLab Registry...' &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        echo '2. Pulling latest image...' &&
        docker pull $CI_REGISTRY_IMAGE:latest &&
        echo '3. Restarting containers...' &&
        docker compose down 2>/dev/null || true &&
        docker compose up -d &&
        echo '✅ Deploy complete!'
      "
