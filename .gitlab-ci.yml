stages:
  - test
  - build
  - deploy

variables:
  NODE_IMAGE: node:20-bookworm-slim

# --- Test stage ---
test:
  stage: test
  image: $NODE_IMAGE
  before_script:
    - apt-get update -qq && apt-get install -y -qq ffmpeg > /dev/null 2>&1
    - npm ci --omit=dev
  script:
    - node scripts/smoke.js
    - node scripts/render-check.js
  rules:
    - if: $CI_COMMIT_BRANCH

# --- Build stage ---
# Build Docker image and push to GitLab Container Registry.
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# --- Deploy stage ---
# Deploy to server via SSH. Requires CI/CD variables:
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST << EOF
        cd $DEPLOY_PATH
        
        # Generate .env from GitLab CI/CD variables
        cat > .env << 'ENVFILE'
      PORT=${APP_PORT:-7575}
      SESSION_SECRET=${SESSION_SECRET}
      NODE_ENV=production
      TZ=${APP_TZ:-Asia/Jakarta}
      TZ_LABEL=${APP_TZ_LABEL:-WIB}
      ENVFILE

        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
        docker pull $CI_REGISTRY_IMAGE:latest
        docker compose down
        docker compose up -d
        echo "Deploy complete"
      EOF
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  environment:
    name: production
    url: https://$DEPLOY_HOST
