stages:
  - test
  - build
  - deploy

variables:
  NODE_IMAGE: node:20-bookworm-slim

# --- Test stage ---
test:
  stage: test
  image: $NODE_IMAGE
  before_script:
    - apt-get update -qq && apt-get install -y -qq ffmpeg > /dev/null 2>&1
    - npm ci --omit=dev
  script:
    - node scripts/smoke.js
    - node scripts/render-check.js
  rules:
    - if: $CI_COMMIT_BRANCH

# --- Build stage ---
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# --- Deploy stage ---
deploy:
  stage: deploy
  image: alpine:latest
  environment:
    name: AwanStream
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - 'command -v ssh-agent >/dev/null || ( apk add --update openssh )'
    - eval $(ssh-agent -s)
    # Diagnostic output — helps identify variable injection issues.
    - echo "=== Diagnostic ==="
    - echo "Branch               : $CI_COMMIT_REF_NAME"
    - echo "Default branch       : $CI_DEFAULT_BRANCH"
    - echo "Ref protected        : $CI_COMMIT_REF_PROTECTED"
    - echo "Environment          : $CI_ENVIRONMENT_NAME"
    - echo "DEPLOY_HOST set      : $([ -n \"$DEPLOY_HOST\" ] && echo yes || echo NO)"
    - echo "DEPLOY_USER set      : $([ -n \"$DEPLOY_USER\" ] && echo yes || echo NO)"
    - echo "DEPLOY_PATH set      : $([ -n \"$DEPLOY_PATH\" ] && echo yes || echo NO)"
    - echo "DEPLOY_SSH_KEY set   : $([ -n \"$DEPLOY_SSH_KEY\" ] && echo yes || echo NO)"
    - echo "SESSION_SECRET set   : $([ -n \"$SESSION_SECRET\" ] && echo yes || echo NO)"
    - echo "=================="
    - |
      if [ -z "$DEPLOY_SSH_KEY" ]; then
        echo ""
        echo "❌ DEPLOY_SSH_KEY is empty."
        echo ""
        echo "Possible causes (match against diagnostic above):"
        echo ""
        echo "1. If 'Ref protected' = false AND variable is 'Protected':"
        echo "   → Uncheck 'Protect variable' in Settings → CI/CD → Variables,"
        echo "     OR protect the branch in Settings → Repository → Protected branches."
        echo ""
        echo "2. If variable has an Environment scope (e.g. 'production'):"
        echo "   → Edit the variable and set scope to '*' (All)."
        echo ""
        echo "3. Also verify variable type is 'File' (not 'Variable')."
        echo "   File type stores the key content and exposes it as a path at runtime."
        exit 1
      fi
    - echo "✓ DEPLOY_SSH_KEY path = $DEPLOY_SSH_KEY"
    - chmod 400 "$DEPLOY_SSH_KEY"
    - ssh-add "$DEPLOY_SSH_KEY"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts || true
  script:
    - echo "🚀 Deploying AwanStream to production..."
    - |
      ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "
        mkdir -p $DEPLOY_PATH &&
        cd $DEPLOY_PATH &&
        cat > .env << 'ENVEOF'
      PORT=$APP_PORT
      SESSION_SECRET=$SESSION_SECRET
      NODE_ENV=production
      TZ=$APP_TZ
      TZ_LABEL=$APP_TZ_LABEL
      ENVEOF
        chmod 600 .env
      "
    - scp docker-compose.yml $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml
    - |
      ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH &&
        echo '1. Login to GitLab Registry...' &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        echo '2. Pulling latest image...' &&
        docker pull $CI_REGISTRY_IMAGE:latest &&
        echo '3. Restarting containers...' &&
        docker compose down 2>/dev/null || true &&
        docker compose up -d &&
        echo '✅ Deploy complete!'
      "
